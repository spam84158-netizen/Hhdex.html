  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;}

  input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  .card::before{content:"";position:absolute;top:0;left:-150%;width:60%;height:100%;background:linear-gradient(75deg, transparent, rgba(255,255,255,0.07), transparent);transition:left .7s ease;pointer-events:none;}

});

/* ------------------------------------------------------------
   Demandes de numéros (partagées entre le client et l'admin)
   Collection Firestore : "numberRequests"
   Champs : uid, userEmail, country, number, price, method,
            receiptUrl, status ("pending"|"accepted"|"rejected"),
            adminNote, createdAt
------------------------------------------------------------ */
window.BAZA_DB = {
  listenAll: (cb) => {
    const q = query(collection(db, "numberRequests"), orderBy("createdAt", "desc"));
    return onSnapshot(q, (snap) => {
      const rows = [];
      snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
      cb(rows);
    });
  },
  uploadReceipt: async (uid, file) => {
    const path = `receipts/${uid}/${Date.now()}_${file.name}`;
    const r = ref(storage, path);
    await uploadBytes(r, file);
    return await getDownloadURL(r);
  },
  createRequest: async (payload) => {
    return await addDoc(collection(db, "numberRequests"), {
      ...payload,
      status: "pending",
      adminNote: "",
      createdAt: serverTimestamp(),
    });
  },
  setStatus: async (id, status, adminNote) => {
    await updateDoc(doc(db, "numberRequests", id), { status, adminNote: adminNote || "" });
  },
};
</script>

function pad(n, len){ return String(n).padStart(len,'0'); }

// RNG déterministe (mulberry32) : à seed égale, la même suite de nombres est
// produite à chaque chargement. Ça garantit que la liste de numéros et leurs
// disponibilités WhatsApp/Facebook/Telegram restent STABLES pour un pays donné
// (fini le "je sors, je rentre, le numéro a changé").
function mulberry32(seed){
  let s = seed >>> 0;
  return function(){
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashSeed(str){
  let h = 0;
  for (let i=0;i<str.length;i++){ h = (Math.imul(h,31) + str.charCodeAt(i)) | 0; }
  return h;
}

/* ------------------------------------------------------------
   Génère (une seule fois, de façon stable) la liste des numéros
   disponibles pour un pays, avec les plateformes actives sur
   chaque numéro (WhatsApp / Facebook / Telegram).
------------------------------------------------------------ */
const NUMBERS_CACHE = {};
function getCountryNumbers(country){
  if (NUMBERS_CACHE[country.name]) return NUMBERS_CACHE[country.name];
  const count = Math.min(country.available, 40);
  const rand = mulberry32(hashSeed(country.code + "|" + country.name));
  const r = (max) => Math.floor(rand() * max);
  const seen = new Set();
  const list = [];
  let guard = 0;
  while (list.length < count && guard < count * 6){
    guard++;
    const number = country.gen(r);
    if (seen.has(number)) continue;
    seen.add(number);
    list.push({
      id: `${country.code}-${list.length}`,
      number,
      platforms: {
        whatsapp: true,               // tous les numéros supportent WhatsApp
        facebook: rand() > 0.4,
        telegram: rand() > 0.35,
      },
    });
  }
  NUMBERS_CACHE[country.name] = list;
  return list;
}

// Statut d'un numéro donné, déduit des demandes Firestore synchronisées
function numberStatus(country, number){
  const rows = state.allRequests.filter(r => r.country === country.name && r.number === number);
  if (rows.some(r => r.status === "accepted")) return { state:"taken" };
  if (rows.some(r => r.status === "pending")) return { state:"pending" };
  return { state:"free" };
}

      <div class="glass" style="padding:20px;margin-bottom:22px;">

      <p style="color:var(--text-faint);font-size:11.5px;margin-top:10px;">Le numéro ne vous est pas attribué automatiquement : votre demande passe en attente jusqu'à validation.</p>
    `;
  } else if (step === "sending") {
    inner = `
      <div style="text-align:center;padding:20px 0;">
        <div class="spinner" style="margin:0 auto 16px;"></div>
        <div style="font-weight:600;margin-bottom:4px;">Envoi de votre demande…</div>
        <div style="color:var(--text-faint);font-size:13px;">Téléversement du reçu en cours.</div>
      </div>
    `;
  } else if (step === "sent") {
    inner = `
      <div style="text-align:center;padding:16px 0;">
        <div style="width:46px;height:46px;border-radius:50%;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">${icon('check',22,'var(--gold-bright)')}</div>
        <div style="font-weight:600;margin-bottom:4px;">Demande envoyée</div>
        <div style="color:var(--text-faint);font-size:13px;">Elle est en attente de validation. Le statut apparaîtra dans "Vos demandes".</div>
        <button class="btn btn-ghost" id="modal-finish" style="width:100%;margin-top:18px;">Fermer</button>
      </div>
    `;
  } else if (step === "error") {
    inner = `
      <div style="text-align:center;padding:16px 0;">
        <div style="color:var(--danger);font-weight:600;margin-bottom:8px;">Échec de l'envoi</div>
        <div style="color:var(--text-faint);font-size:13px;margin-bottom:16px;">${numbersFlow.errorMsg || "Une erreur est survenue."}</div>
        <button class="btn btn-ghost" id="modal-retry" style="width:100%;">Réessayer</button>
      </div>
    `;
  }
  box.innerHTML = `
    <div class="glass modal-box">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
        <span style="font-size:28px;">${country.flag}</span>
        <div><div class="display" style="font-weight:600;font-size:17px;">${country.name}</div><div style="color:var(--text-faint);font-size:12px;">${country.price}</div></div>
        <button id="modal-close" style="margin-left:auto;background:none;border:none;color:var(--text-faint);cursor:pointer;">${icon('x',18)}</button>
      </div>
      ${inner}
    </div>
  `;
  document.getElementById("modal-close").onclick = closeModal;

  if (step === "payment") {
    document.querySelectorAll('input[name="paymethod"]').forEach(r => r.onchange = () => { numbersFlow.method = r.value; renderNumberModal(); });
    document.getElementById("receipt-input").onchange = (e) => {
      numbersFlow.receiptFile = e.target.files?.[0] || null;
      renderNumberModal();
    };
    document.getElementById("modal-send").onclick = async () => {
      const email = document.getElementById("request-email").value.trim();
      const errBox = document.getElementById("modal-error");
      if (!numbersFlow.receiptFile) { errBox.textContent = "Merci d'importer une photo ou capture du reçu de paiement."; return; }
      if (!email) { errBox.textContent = "Merci d'indiquer un e-mail de contact."; return; }
      numbersFlow.step = "sending"; renderNumberModal();
      try {
        const receiptUrl = await window.BAZA_DB.uploadReceipt(state.user.uid, numbersFlow.receiptFile);
        await window.BAZA_DB.createRequest({
          uid: state.user.uid,
          userEmail: email,
          country: country.name,
          number,
          price: country.price,
          method: numbersFlow.method,
          receiptUrl,
        });
        numbersFlow.step = "sent"; renderNumberModal();
      } catch (e) {
        console.error("Erreur envoi demande :", e);
        numbersFlow.step = "error"; numbersFlow.errorMsg = e.message || String(e); renderNumberModal();
      }
    };
  } else if (step === "sent") {
    document.getElementById("modal-finish").onclick = () => { closeModal(); renderContent(); };
  } else if (step === "error") {
    document.getElementById("modal-retry").onclick = () => { numbersFlow.step = "payment"; renderNumberModal(); };
  }
}

function adminHtml(){
  if (state.user?.email !== ADMIN_EMAIL) {
    return `${topBarHtml("Admin")}<p style="color:var(--text-dim);">Accès réservé.</p>`;
  }
  const pending = state.allRequests.filter(r => r.status === "pending");
  const history = state.allRequests.filter(r => r.status !== "pending").slice(0, 20);

  const rowHtml = (r, withActions) => `
    <div class="glass" style="padding:16px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
        <div>
          <div class="display" style="font-weight:600;font-size:15px;">${COUNTRIES.find(c=>c.name===r.country)?.flag || ""} ${r.number}</div>
          <div style="color:var(--text-faint);font-size:12px;">${r.userEmail} · ${PAYMENT_METHODS.find(m=>m.id===r.method)?.label || r.method} · ${r.price || ""}</div>
        </div>
        ${!withActions ? (r.status === "accepted"
          ? `<span class="pill" style="background:var(--jade-soft);color:var(--jade);border-color:transparent;">Acceptée</span>`
          : `<span class="pill" style="background:rgba(232,97,95,0.14);color:var(--danger);border-color:transparent;">Refusée</span>`) : ""}
      </div>
      ${r.receiptUrl ? `<a href="${r.receiptUrl}" target="_blank" rel="noopener" style="color:var(--gold-bright);font-size:12.5px;">Voir le reçu ${icon('chevronRight',12)}</a>` : ""}
      ${r.status === "rejected" && r.adminNote ? `<div style="color:var(--text-faint);font-size:12px;">Motif envoyé : ${r.adminNote}</div>` : ""}
      ${withActions ? `
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" data-accept="${r.id}" style="flex:1;">${icon('check',15)} Accepter</button>
          <button class="btn btn-ghost" data-reject="${r.id}" style="flex:1;">${icon('x',15)} Refuser</button>
        </div>
      ` : ""}
    </div>
  `;

  return `
    ${topBarHtml("Panneau Admin")}
    <div class="display" style="font-weight:600;font-size:15px;margin-bottom:12px;">En attente (${pending.length})</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:26px;">
      ${pending.length ? pending.map(r => rowHtml(r, true)).join("") : `<p style="color:var(--text-faint);font-size:13px;">Aucune demande en attente.</p>`}
    </div>
    <div class="display" style="font-weight:600;font-size:15px;margin-bottom:12px;">Historique récent</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${history.length ? history.map(r => rowHtml(r, false)).join("") : `<p style="color:var(--text-faint);font-size:13px;">Rien pour l'instant.</p>`}
    </div>
  `;
}
function bindAdmin(){
  if (state.user?.email !== ADMIN_EMAIL) return;
  document.querySelectorAll("[data-accept]").forEach(btn => {
    btn.onclick = async () => {
      btn.disabled = true;
      await window.BAZA_DB.setStatus(btn.dataset.accept, "accepted");
    };
  });
  document.querySelectorAll("[data-reject]").forEach(btn => {
    btn.onclick = async () => {
      const reason = prompt("Motif du refus (envoyé à l'utilisateur) :", "Le paiement n'a pas pu être vérifié / n'a pas été réellement effectué.");
      if (reason === null) return;
      btn.disabled = true;
      await window.BAZA_DB.setStatus(btn.dataset.reject, "rejected", reason);
    };
  });
}

    body = `

      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px;font-weight:600;">Langue</div>
