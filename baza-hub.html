<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BAZA HUB</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
<style>
  :root{
    --ink:#08080B;
    --ink-2:#0E0D13;
    --gold:#C9A227;
    --gold-soft:rgba(201,162,39,0.14);
    --gold-bright:#E8C34E;
    --jade:#2FBF8F;
    --jade-soft:rgba(47,191,143,0.14);
    --text:#F3F1E9;
    --text-dim:#A6A196;
    --text-faint:#6E6A61;
    --glass:rgba(255,255,255,0.045);
    --glass-border:rgba(255,255,255,0.09);
    --danger:#E8615F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;}
  h1,h2,h3,.display{font-family:'Sora',sans-serif;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.14);border-radius:99px;}

  #bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:
      radial-gradient(ellipse 60% 40% at 15% 10%, rgba(201,162,39,0.10), transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 85%, rgba(47,191,143,0.08), transparent 60%),
      var(--ink);
  }
  #bg::after{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);background-size:28px 28px;}

  .glass{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(135deg, var(--gold), var(--gold-bright));color:#141008;box-shadow:0 8px 24px rgba(201,162,39,0.28);}
  .btn-ghost{background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);color:var(--text);}
  .btn-ghost:hover{background:rgba(255,255,255,0.07);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  input,textarea{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.04);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;}
  input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  .card{position:relative;overflow:hidden;cursor:pointer;text-align:left;transition:border-color .2s ease, transform .2s ease;}
  .card::before{content:"";position:absolute;top:0;left:-150%;width:60%;height:100%;background:linear-gradient(75deg, transparent, rgba(255,255,255,0.07), transparent);transition:left .7s ease;pointer-events:none;}
  .card:hover::before{left:150%;}
  .card:hover{border-color:rgba(255,255,255,0.22);transform:translateY(-2px);}

  #app{position:relative;z-index:1;min-height:100vh;}
  .center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

  #sidebar{position:fixed;top:0;bottom:0;left:0;width:240px;padding:16px;z-index:20;transition:transform .25s ease;}
  #sidebar.closed{transform:translateX(-110%);}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:15;display:none;}
  #overlay.show{display:block;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:none;background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-weight:500;font-size:14px;cursor:pointer;text-align:left;width:100%;transition:background .15s ease,color .15s ease;}
  .nav-item:hover{background:rgba(255,255,255,0.04);}
  .nav-item.active{background:var(--gold-soft);color:var(--gold-bright);font-weight:600;}

  #content{margin-left:272px;padding:28px 28px 60px;}
  @media (max-width:860px){
    #sidebar{transform:translateX(-110%);}
    #sidebar.open{transform:translateX(0);}
    #content{margin-left:0;}
    .menu-btn{display:inline-flex !important;}
    .voice-grid{grid-template-columns:1fr !important;}
  }
  .menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px;}
  .stat-card{padding:18px 20px;display:flex;align-items:center;gap:14px;}
  .icon-box{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  .module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;}
  .module-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;}
  .pill{padding:5px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:rgba(255,255,255,0.05);color:var(--text-faint);border:1px solid var(--glass-border);transition:all .35s ease;}
  .pill.active{border:none;}

  .country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .country-row{padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--glass-border);}
  .country-row.selected{border-color:var(--gold);}

  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:40;padding:20px;}
  #modal-overlay.show{display:flex;}
  .modal-box{width:100%;max-width:420px;padding:28px;}

  .segmented{display:flex;flex-wrap:wrap;gap:6px;}
  .seg-btn{padding:8px 13px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--glass-border);background:rgba(255,255,255,0.03);color:var(--text-dim);}
  .seg-btn.active{border-color:transparent;background:var(--gold);color:#141008;}

  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--glass-border);border-top-color:var(--gold);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .voice-grid{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(0,1fr);gap:20px;}

  .file-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.03);}

  @media (prefers-reduced-motion: reduce){ .card::before{display:none !important;} }
</style>
</head>

<!-- Firebase (modular SDK). Google Sign-In requires this exact HTML file to be
     deployed on a real domain that is added under
     Firebase Console -> Authentication -> Settings -> Authorized domains.
     It will NOT complete inside a sandboxed preview iframe. -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzH-n82Ieh_vcn8AK-rIDPpqtMjJeeXgw",
  authDomain: "vibe-app-a81d4.firebaseapp.com",
  projectId: "vibe-app-a81d4",
  storageBucket: "vibe-app-a81d4.firebasestorage.app",
  messagingSenderId: "973098397469",
  appId: "1:973098397469:web:4b0f2ab4b0f50b22c53bf4",
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const googleProvider = new GoogleAuthProvider();

window.BAZA_AUTH = {
  signInGoogle: async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      return result.user;
    } catch (e) {
      console.error("Erreur de connexion Google :", e);
      alert("La connexion Google a échoué ici (aperçu en bac à sable). Déployez ce fichier sur votre domaine et ajoutez-le dans Firebase Console > Authentication > Domaines autorisés.");
      return null;
    }
  },
  signOutUser: () => signOut(auth),
};

onAuthStateChanged(auth, (user) => {
  window.__bazaCurrentUser = user;
  if (window.bazaOnAuthChange) window.bazaOnAuthChange(user);
});
</script>

function syncMobile(){

function topBarHtml(title){

function renderContent(){
  const c = document.getElementById("content");
  activeTimers.forEach(t => clearInterval(t));
  activeTimers = [];
  if (state.view === "dashboard") { c.innerHTML = dashboardHtml(); bindTopBar(); bindDashboard(); }
  else if (state.view === "numbers") { c.innerHTML = numbersHtml(); bindTopBar(); bindNumbers(); }
  else if (state.view === "voice") { c.innerHTML = voiceHtml(); bindTopBar(); bindVoice(); }

}
function startDemoPanel(moduleId, accent){
  const steps = MODULE_DEMOS[moduleId];
  let idx = 0;
  const timer = setInterval(() => {
    idx = (idx + 1) % steps.length;
    const numEl = document.getElementById(`demo-num-${moduleId}`);
    const labelEl = document.getElementById(`demo-label-${moduleId}`);
    if (!numEl || !labelEl) { clearInterval(timer); return; }
    numEl.textContent = idx + 1;
    labelEl.textContent = steps[idx];
    document.querySelectorAll(`#demo-dots-${moduleId} [data-dot]`).forEach(d => {
      d.style.background = Number(d.dataset.dot) === idx ? accent : 'rgba(255,255,255,0.1)';

  activeTimers.push(timer);
}

function bindDashboard(){

  });
  const accentByModule = { numbers:"var(--gold)", voice:"var(--gold)", video:"var(--jade)" };
  Object.keys(MODULE_DEMOS).forEach(moduleId => {
    let active = 0;
    const total = MODULE_DEMOS[moduleId].length;
    const timer = setInterval(() => {
      active = (active + 1) % total;
      document.querySelectorAll(`.demo-pill[data-module="${moduleId}"]`).forEach(pill => {
        const idx = Number(pill.dataset.idx);

function renderCountryGrid(filter=""){
  const grid = document.getElementById("country-grid");
  if (!grid) return;

  grid.innerHTML = list.map(c => `

  startDemoPanel("numbers", "#C9A227");

function openNumberModal(){
  document.getElementById("modal-overlay").classList.add("show");
  renderNumberModal();
}
function closeModal(){
  document.getElementById("modal-overlay").classList.remove("show");
}
function renderNumberModal(){
  const { country, number, step } = numbersFlow;
  const box = document.getElementById("modal-content");
  let inner = "";
  if (step === "pick") {
    inner = number ? `
      <div style="padding:16px;border-radius:12px;background:rgba(255,255,255,0.04);text-align:center;font-family:'Sora';font-size:19px;font-weight:600;margin-bottom:16px;letter-spacing:0.3px;">${number}</div>
      <button class="btn btn-primary" id="modal-next" style="width:100%;">${icon('arrowRight',16)} Continuer vers le paiement</button>
    ` : `
      <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">Générer un numéro réel disponible pour ${country.name} (${country.code}).</p>
      <button class="btn btn-primary" id="modal-gen" style="width:100%;">Obtenir un numéro</button>
    `;
  } else if (step === "payment") {
    inner = `
      <p style="color:var(--text-dim);font-size:13px;margin-bottom:14px;">Numéro sélectionné : <strong style="color:var(--text);">${number}</strong></p>
      <div style="padding:14px;border-radius:12px;background:rgba(255,255,255,0.04);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--text-dim);">Total à payer</span>
        <span class="display" style="font-weight:700;font-size:18px;">${country.price}</span>
      </div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px;font-weight:600;">Choisir un moyen de paiement</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px;">
        ${PAYMENT_METHODS.map((m,i) => `
          <label style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;border:1px solid var(--glass-border);cursor:pointer;">
            <input type="radio" name="paymethod" value="${m.label}" ${i===0?'checked':''} />
            <div><div style="font-weight:600;font-size:13.5px;">${m.label}</div><div style="color:var(--text-faint);font-size:11.5px;">${m.detail}</div></div>
          </label>
        `).join("")}
      </div>
      <button class="btn btn-primary" id="modal-pay" style="width:100%;">${icon('card',16)} Payer ${country.price.split('/')[0]}</button>
    `;
  } else if (step === "processing") {
    inner = `
      <div style="text-align:center;padding:20px 0;">
        <div class="spinner" style="margin:0 auto 16px;"></div>
        <div style="font-weight:600;margin-bottom:4px;">Paiement en cours…</div>
        <div style="color:var(--text-faint);font-size:13px;">Confirmation de la transaction.</div>
      </div>
    `;
  } else if (step === "done") {
    inner = `
      <div style="text-align:center;padding:16px 0;">
        <div style="width:46px;height:46px;border-radius:50%;background:var(--jade-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">${icon('check',22,'var(--jade)')}</div>
        <div style="font-weight:600;margin-bottom:4px;">Paiement confirmé — numéro attribué</div>
        <div style="color:var(--text-faint);font-size:13px;">Retrouvez-le dans "Vos numéros".</div>
      </div>
    `;
  }
  box.innerHTML = `
    <div class="glass modal-box">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
        <span style="font-size:28px;">${country.flag}</span>
        <div><div class="display" style="font-weight:600;font-size:17px;">${country.name}</div><div style="color:var(--text-faint);font-size:12px;">${country.price}</div></div>
        <button id="modal-close" style="margin-left:auto;background:none;border:none;color:var(--text-faint);cursor:pointer;">${icon('x',18)}</button>
      </div>
      ${inner}
    </div>
  `;
  document.getElementById("modal-close").onclick = closeModal;
  const genBtn = document.getElementById("modal-gen");
  if (genBtn) genBtn.onclick = () => { numbersFlow.number = country.gen(); renderNumberModal(); };
  const nextBtn = document.getElementById("modal-next");
  if (nextBtn) nextBtn.onclick = () => { numbersFlow.step = "payment"; renderNumberModal(); };
  const payBtn = document.getElementById("modal-pay");
  if (payBtn) payBtn.onclick = () => {
    numbersFlow.step = "processing"; renderNumberModal();
    setTimeout(() => {
      state.owned.push({ country, number: numbersFlow.number, date:"Aujourd'hui" });
      numbersFlow.step = "done"; renderNumberModal();
      setTimeout(() => { closeModal(); bindNumbers(); }, 1400);
    }, 1300);
  };
}

  const stepsHtml = steps.map((s,i) => `
    <span class="pill ${i+1===videoState.step ? 'active' : ''}" style="${i+1===videoState.step ? 'background:var(--jade-soft);color:var(--jade);' : i+1<videoState.step ? 'color:var(--text-dim);' : ''}">
      ${i+1<videoState.step ? icon('check',11)+' ' : ''}${s}
    </span>
    ${i<steps.length-1 ? icon('chevronRight',12,'var(--text-faint)') : ''}
  `).join("");

  let body = "";
  if (videoState.step === 1) {
    body = `
      <div class="display" style="font-weight:600;font-size:16px;margin-bottom:4px;">Créer votre avatar</div>
      <p style="color:var(--text-dim);font-size:13px;margin-bottom:18px;">Importez une photo et donnez un nom à cet avatar.</p>
      <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:30px;border-radius:14px;border:1.5px dashed var(--glass-border);cursor:pointer;margin-bottom:16px;">
        ${icon('upload',22,'var(--text-faint)')}
        <span style="font-size:13px;color:var(--text-dim);" id="photo-label">${videoState.photoName || "Cliquez pour importer une photo"}</span>
        <input type="file" accept="image/*" style="display:none;" id="photo-input" />
      </label>
      <input id="avatar-name" placeholder="Nom de l'avatar" value="${videoState.name}" />
      <button class="btn btn-primary" id="video-next-1" style="width:100%;margin-top:18px;" ${(!videoState.photoName || !videoState.name)?'disabled':''}>${icon('arrowRight',16)} Continuer</button>
    `;
  } else if (videoState.step === 2) {
    body = `
      <div class="display" style="font-weight:600;font-size:16px;margin-bottom:16px;">Langue et voix</div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px;font-weight:600;">Langue</div>
      <div class="segmented" id="v2-langs">${LANGS.map(l=>`<button class="seg-btn ${videoState.lang===l?'active':''}" data-lang="${l}">${l}</button>`).join("")}</div>
      <div style="margin-top:18px;margin-bottom:8px;font-size:13px;color:var(--text-dim);font-weight:600;">Voix</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;" id="v2-voices">
        ${VOICES.map(v=>`<button class="seg-btn" data-voice="${v.id}" style="text-align:left;padding:12px;${videoState.voice===v.id?'border-color:var(--gold);background:var(--gold-soft);color:var(--text);':''}">${v.label}</button>`).join("")}
      </div>
      <div style="display:flex;gap:10px;margin-top:18px;">
        <button class="btn btn-ghost" id="video-back-2">${icon('chevronLeft',16)} Retour</button>
        <button class="btn btn-primary" id="video-next-2" style="flex:1;">Continuer ${icon('arrowRight',16)}</button>
      </div>
    `;
  } else if (videoState.step === 3) {
    body = `
      <div class="display" style="font-weight:600;font-size:16px;margin-bottom:4px;">Texte à présenter</div>
      <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">Ce texte sera prononcé par votre avatar.</p>
      <textarea id="video-text" rows="6" placeholder="Bonjour, je m'appelle…">${videoState.text}</textarea>
      <div style="display:flex;gap:10px;margin-top:18px;">
        <button class="btn btn-ghost" id="video-back-3">${icon('chevronLeft',16)} Retour</button>
        <button class="btn btn-primary" id="video-generate" style="flex:1;" ${!videoState.text.trim()?'disabled':''}>${icon('sparkles',16)} Générer la vidéo</button>
      </div>
    `;
  } else if (videoState.step === 4) {
    if (videoState.status !== "done") {
      body = `
        <div style="text-align:center;padding:20px 0;">
          <div class="spinner" style="border-top-color:var(--jade);margin:0 auto 16px;"></div>
          <div style="font-weight:600;margin-bottom:4px;">Génération de la vidéo…</div>
          <div style="color:var(--text-faint);font-size:13px;">${videoState.name} s'apprête à présenter votre texte en ${videoState.lang.toLowerCase()}.</div>
        </div>
      `;
    } else {
      body = `
        <div style="text-align:center;padding:20px 0;">
          <div style="width:52px;height:52px;border-radius:50%;background:var(--jade-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">${icon('check',24,'var(--jade)')}</div>
          <div style="font-weight:600;margin-bottom:6px;">Vidéo générée avec succès</div>
          <div style="color:var(--text-faint);font-size:13px;margin-bottom:20px;">Disponible dans vos fichiers générés.</div>
          <button class="btn btn-ghost" id="video-restart">Créer une nouvelle vidéo</button>
        </div>
      `;
    }
  }

  const videoFiles = state.files.filter(f=>f.type==='video');
  return `
    ${topBarHtml("Studio Vidéo IA")}
    ${demoPanelHtml("video", "Comment ça marche", "var(--jade)")}
    <div class="glass" style="padding:16px;margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">${stepsHtml}</div>
    </div>
    <div class="glass" style="padding:26px;max-width:560px;">${body}</div>
    ${videoFiles.length ? fileListHtml("Vidéos générées", videoFiles) : ""}
  `;
}
function bindVideo(){
  startDemoPanel("video", "#2FBF8F");
  if (videoState.step === 1) {
    document.getElementById("photo-input").onchange = (e) => {
      videoState.photoName = e.target.files?.[0]?.name || null;
      renderContent();
    };
    document.getElementById("avatar-name").oninput = (e) => {
      videoState.name = e.target.value;
      document.getElementById("video-next-1").disabled = !(videoState.photoName && videoState.name);
    };
    document.getElementById("video-next-1").onclick = () => { videoState.step = 2; renderContent(); };
  } else if (videoState.step === 2) {
    document.querySelectorAll("#v2-langs .seg-btn").forEach(b => b.onclick = () => { videoState.lang = b.dataset.lang; renderContent(); });
    document.querySelectorAll("#v2-voices .seg-btn").forEach(b => b.onclick = () => { videoState.voice = b.dataset.voice; renderContent(); });
    document.getElementById("video-back-2").onclick = () => { videoState.step = 1; renderContent(); };
    document.getElementById("video-next-2").onclick = () => { videoState.step = 3; renderContent(); };
  } else if (videoState.step === 3) {
    const ta = document.getElementById("video-text");
    ta.oninput = () => { videoState.text = ta.value; document.getElementById("video-generate").disabled = !videoState.text.trim(); };
    document.getElementById("video-back-3").onclick = () => { videoState.step = 2; renderContent(); };
    document.getElementById("video-generate").onclick = () => {
      videoState.step = 4; videoState.status = "generating"; renderContent();
      setTimeout(() => {
        videoState.status = "done";
        state.files.unshift({ name:`avatar_${videoState.name||'sans_nom'}_${Date.now()}.mp4`, type:"video", date:"À l'instant" });
        renderContent();
      }, 2200);
    };
  } else if (videoState.step === 4 && videoState.status === "done") {
    const btn = document.getElementById("video-restart");
    if (btn) btn.onclick = () => { videoState = { step:1, name:"", lang:"Français", voice:VOICES[0].id, text:"", photoName:null, status:"idle" }; renderContent(); };
  }
}

  ];
  return `
    ${topBarHtml("Paramètres")}
    <div class="glass" style="padding:22px;margin-bottom:20px;display:flex;align-items:center;gap:16px;">
      ${state.user?.photoURL
        ? `<img src="${state.user.photoURL}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;" />`
        : `<div style="width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--jade),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:700;font-size:20px;color:#141008;">${displayName[0].toUpperCase()}</div>`
      }
      <div>
        <div class="display" style="font-weight:600;font-size:17px;">${displayName}</div>
        <div style="color:var(--text-faint);font-size:13px;">Plan Premium · renouvellement automatique activé</div>
      </div>
    </div>
    <div class="display" style="font-weight:600;font-size:14px;margin:4px 0 10px;">Moyens de paiement</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:22px;">
      ${PAYMENT_METHODS.map(m => `
        <div class="glass" style="padding:16px;display:flex;align-items:center;gap:14px;">
          <div class="icon-box" style="background:var(--gold-soft);">${icon('card',17,'var(--gold-bright)')}</div>
          <div style="flex:1;"><div style="font-weight:600;font-size:14px;">${m.label}</div><div style="color:var(--text-faint);font-size:12.5px;">${m.detail}</div></div>
        </div>
      `).join("")}
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${rows.map(r => `
        <div class="glass" style="padding:16px;display:flex;align-items:center;gap:14px;">
          <div class="icon-box">${icon(r.icon,17,'var(--text-dim)')}</div>
          <div style="flex:1;"><div style="font-weight:600;font-size:14px;">${r.label}</div><div style="color:var(--text-faint);font-size:12.5px;">${r.desc}</div></div>
          ${icon('chevronRight',16,'var(--text-faint)')}
        </div>
      `).join("")}
    </div>
  `;
}
